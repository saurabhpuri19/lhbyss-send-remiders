    When you use a regular password to log into Gmail, Google blocks scripts/apps from using that password directly for security reasons. To get around this, Google provides App Passwords — but App Passwords are only available if your Google account has 2-Step Verification (2FA) turned on.

  2-Step Verification means when you log into Google, you need two things:

    Your regular password
    A second proof — like a code sent to your phone via SMS, or a prompt on your phone saying "Was this you?"
    How to turn it on (takes 2 minutes)
    Go to myaccount.google.com
    Click "Security" on the left sidebar
    Under "How you sign in to Google", click "2-Step Verification"
    Click "Get started" and follow the prompts
    Google will ask you to verify with your phone number or the Google app
    Once that's done, you'll be able to generate an App Password specifically for this script, which is what goes into the GMAIL_APP_PASSWORD secret.
    
    If your Gmail account already asks for a code when you log in from a new device, then 2-Step Verification is already on — you can skip straight to generating the App Password.

