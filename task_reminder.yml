  name: Daily Task Reminder

  on:
    schedule:
      # Runs every day at 08:00 AM UTC  →  1:30 PM IST
      # Adjust the time: UTC 02:30 = IST 08:00  |  UTC 08:00 = IST 13:30
      - cron: "0 4 * * *"

    # Allows manual trigger from the Actions tab for testing
    workflow_dispatch:

  jobs:
    send-reminders:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up Python 3.11
          uses: actions/setup-python@v5
          with:
            python-version: "3.11"

        - name: Cache pip packages
          uses: actions/cache@v4
          with:
            path: ~/.cache/pip
            key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
            restore-keys: |
              ${{ runner.os }}-pip-

        - name: Install dependencies
          run: pip install -r requirements.txt

        - name: Run task reminder
          env:
            SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
            SUPABASE_KEY:    ${{ secrets.SUPABASE_KEY }}
            RESEND_API_KEY:  ${{ secrets.RESEND_API_KEY }}
            SENDER_EMAIL:    ${{ secrets.SENDER_EMAIL }}
          run: python send_reminders.py

